basePath: /
definitions:
  handler.CreateRoomRequest:
    properties:
      description:
        maxLength: 500
        type: string
      is_encrypted:
        type: boolean
      name:
        maxLength: 100
        type: string
      topic:
        maxLength: 500
        type: string
      type:
        type: string
    required:
    - type
    type: object
  handler.InviteMemberRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  handler.LoginRequest:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      email:
        type: string
      password:
        type: string
    required:
    - device_id
    - email
    - password
    type: object
  handler.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.RefreshRequest:
    properties:
      device_id:
        type: string
      refresh_token:
        type: string
    required:
    - device_id
    - refresh_token
    type: object
  handler.RegisterRequest:
    properties:
      display_name:
        maxLength: 100
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - display_name
    - email
    - password
    - username
    type: object
  handler.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      display_name:
        maxLength: 100
        type: string
    type: object
  handler.UpdateSettingsRequest:
    properties:
      language:
        maxLength: 10
        type: string
      notifications_enabled:
        type: boolean
      theme:
        maxLength: 20
        type: string
      timezone:
        maxLength: 50
        type: string
    type: object
  handler.markReadRequest:
    properties:
      last_read_message_id:
        type: string
    required:
    - last_read_message_id
    type: object
  handler.presenceRequest:
    properties:
      status:
        description: '''online'', ''away'', ''busy'', ''offline'''
        type: string
    required:
    - status
    type: object
  handler.presignRequest:
    properties:
      content_type:
        type: string
      filename:
        type: string
    required:
    - filename
    type: object
  response.ErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
      status:
        type: integer
    type: object
  response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/response.ErrorDetail'
      success:
        type: boolean
    type: object
  response.SuccessResponse:
    properties:
      data: {}
      meta: {}
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Saybridge Platform Backend API.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Saybridge API
  version: "1.0"
paths:
  /admin/retention:
    get:
      description: Returns all data retention policies (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: List of retention policies
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: List retention policies
      tags:
      - Admin
    post:
      consumes:
      - application/json
      description: Create a new data retention policy (admin only)
      parameters:
      - description: Policy config
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created policy
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Create retention policy
      tags:
      - Admin
  /admin/retention/{id}:
    delete:
      description: Delete a data retention policy (admin only)
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: Policy deleted
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Delete retention policy
      tags:
      - Admin
    patch:
      consumes:
      - application/json
      description: Update a data retention policy (admin only)
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      - description: Policy updates
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Updated policy
          schema:
            type: object
      security:
      - BearerAuth: []
      summary: Update retention policy
      tags:
      - Admin
  /api/v1/admin/marketplace/apps/{id}/disable:
    post:
      description: Temporarily disable an installed marketplace app
      parameters:
      - description: App ID or slug
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Disabled
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Disable error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Disable an app
      tags:
      - Marketplace Admin
  /api/v1/admin/marketplace/apps/{id}/enable:
    post:
      description: Re-enable a disabled marketplace app
      parameters:
      - description: App ID or slug
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Enabled
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Enable error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Enable an app
      tags:
      - Marketplace Admin
  /api/v1/admin/marketplace/apps/{id}/install:
    post:
      description: Install a marketplace app for the current tenant
      parameters:
      - description: App ID or slug
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Installation record
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Install error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Install an app
      tags:
      - Marketplace Admin
  /api/v1/admin/marketplace/apps/{id}/uninstall:
    post:
      description: Remove a marketplace app from the tenant
      parameters:
      - description: App ID or slug
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Uninstalled
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Uninstall error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Uninstall an app
      tags:
      - Marketplace Admin
  /api/v1/admin/marketplace/installed:
    get:
      description: Get all apps installed in the current tenant
      produces:
      - application/json
      responses:
        "200":
          description: Installed apps
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: List installed apps
      tags:
      - Marketplace Admin
  /api/v1/admin/marketplace/review/{versionId}/approve:
    post:
      description: Approve a submitted app version for publication
      parameters:
      - description: Version ID (UUID)
        in: path
        name: versionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Approved version
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Approve error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Approve app version
      tags:
      - Marketplace Admin
  /api/v1/admin/marketplace/review/{versionId}/reject:
    post:
      consumes:
      - application/json
      description: Reject a submitted app version with a reason
      parameters:
      - description: Version ID (UUID)
        in: path
        name: versionId
        required: true
        type: string
      - description: Rejection reason
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Rejected version
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Reject error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reject app version
      tags:
      - Marketplace Admin
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login user and generate access & refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid inputs
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Auth failure
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Login to account
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Terminate the user session associated with the refresh token
      parameters:
      - description: Logout session details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid inputs
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Logout failure
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Logout from session
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh session tokens using a valid refresh token
      parameters:
      - description: Token refresh credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid inputs
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Refresh failure
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with username, email, password, and display
        name
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Registration successful
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid inputs
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Registration fail (conflict)
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /api/v1/developer/apikeys:
    post:
      consumes:
      - application/json
      description: Generate a new API key for developer authentication
      parameters:
      - description: Key name
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Generated key (shown once)
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Not a developer
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Generate API key
      tags:
      - Developer
  /api/v1/developer/apikeys/{id}:
    delete:
      description: Revoke an existing developer API key
      parameters:
      - description: API Key ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Key revoked
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Revoke error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Not a developer
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke API key
      tags:
      - Developer
  /api/v1/developer/apps:
    get:
      description: Get all apps submitted by the authenticated developer
      produces:
      - application/json
      responses:
        "200":
          description: Developer's apps
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "403":
          description: Not a developer
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List developer's apps
      tags:
      - Developer
    post:
      consumes:
      - application/json
      description: Submit a new app to the marketplace for review
      parameters:
      - description: App details
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Submitted app
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Not a developer
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit a new app
      tags:
      - Developer
  /api/v1/developer/apps/{id}/submit-review:
    post:
      consumes:
      - application/json
      description: Submit an app version for admin review and approval
      parameters:
      - description: App ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Version ID to submit
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Submitted for review
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Not a developer
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit for review
      tags:
      - Developer
  /api/v1/developer/apps/{id}/versions:
    post:
      consumes:
      - application/json
      description: Submit a new version for an existing marketplace app
      parameters:
      - description: App ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Version details
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Submitted version
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Not a developer
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit app version
      tags:
      - Developer
  /api/v1/developer/profile:
    get:
      description: Get the marketplace developer profile for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: Developer profile
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get developer profile
      tags:
      - Developer
  /api/v1/developer/register:
    post:
      consumes:
      - application/json
      description: Register the authenticated user as a marketplace app developer
      parameters:
      - description: Developer info (org_name, website, bio)
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Developer profile
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Already registered
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Register as developer
      tags:
      - Developer
  /api/v1/files/presign:
    post:
      consumes:
      - application/json
      description: Generate a presigned URL for uploading a file to S3-compatible
        storage
      parameters:
      - description: File upload details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.presignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Presigned upload and download URLs
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get presigned upload URL
      tags:
      - Files
  /api/v1/marketplace/apps:
    get:
      description: List all available marketplace apps, optionally filtered by category
      parameters:
      - description: Filter by category slug
        in: query
        name: category
        type: string
      - default: 20
        description: Max results
        in: query
        name: limit
        type: integer
      - default: 0
        description: Pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: App list with total count
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Browse marketplace apps
      tags:
      - Marketplace
  /api/v1/marketplace/apps/{id}:
    get:
      description: Get detailed information about a specific marketplace app by slug
      parameters:
      - description: App slug
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: App details
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "404":
          description: App not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get app details
      tags:
      - Marketplace
  /api/v1/marketplace/categories:
    get:
      description: Get list of available marketplace categories with icons
      produces:
      - application/json
      responses:
        "200":
          description: Category list
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Get app categories
      tags:
      - Marketplace
  /api/v1/marketplace/featured:
    get:
      description: Get curated list of featured marketplace apps
      parameters:
      - default: 10
        description: Max featured apps
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Featured apps
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Get featured apps
      tags:
      - Marketplace
  /api/v1/marketplace/reviews/{id}:
    get:
      description: Get paginated reviews for a marketplace app
      parameters:
      - description: App ID
        in: path
        name: id
        required: true
        type: string
      - default: 20
        description: Max results
        in: query
        name: limit
        type: integer
      - default: 0
        description: Pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Review list
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "500":
          description: Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List app reviews
      tags:
      - Marketplace
    post:
      consumes:
      - application/json
      description: Submit a rating and comment for a marketplace app
      parameters:
      - description: App ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Review (rating: 1-5, comment: string)'
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Review created
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit app review
      tags:
      - Marketplace
  /api/v1/marketplace/search:
    get:
      description: Search marketplace apps by name, description, or tags
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - default: 20
        description: Max results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Search results
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Missing query
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Search marketplace apps
      tags:
      - Marketplace
  /api/v1/messages/room/{roomId}:
    get:
      description: Retrieve paginated message history for a room using cursor-based
        pagination
      parameters:
      - description: Room ID (UUID)
        in: path
        name: roomId
        required: true
        type: string
      - default: 50
        description: Number of messages to return
        in: query
        name: limit
        type: integer
      - description: 'Cursor: return messages before this message ID'
        in: query
        name: before_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Message list with pagination cursor
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get message history
      tags:
      - Messages
  /api/v1/messages/thread/{parentId}/replies:
    get:
      description: Retrieve all replies in a message thread
      parameters:
      - description: Parent message ID (UUID)
        in: path
        name: parentId
        required: true
        type: string
      - description: Room ID containing the thread
        in: query
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Thread replies
          schema:

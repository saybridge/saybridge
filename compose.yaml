name: saybridge-infra

services:
  # 1. Core Database (TimescaleDB — PostgreSQL + pgvector for AI semantic search + hypertables for messages)
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: saybridge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: saybridge_user
      POSTGRES_PASSWORD: saybridge_pass
      POSTGRES_DB: saybridge_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - saybridge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saybridge_user -d saybridge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Cache & Session Storage (Redis)
  redis:
    image: redis:7-alpine
    container_name: saybridge_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - saybridge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. Message Broker (NATS with JetStream enabled for WSS Pub/Sub)
  nats:
    image: nats:2.10-alpine
    container_name: saybridge_nats
    restart: unless-stopped
    command: -js -sd /data -m 8222
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats_data:/data
    networks:
      - saybridge-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/varz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 5. Full-text Search Engine (Meilisearch)
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: saybridge_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: meili_master_key_123456
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - ./meilisearch_data:/meili_data
    networks:
      - saybridge-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 6. Object Storage (MinIO S3 Emulator)
  minio:
    image: minio/minio:latest
    container_name: saybridge_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_admin_pass
    ports:
      - "9005:9000"
      - "9006:9001"
    volumes:
      - ./minio_data:/data
    networks:
      - saybridge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 7. Voice & Video SFU Engine (LiveKit Server)
  livekit:
    image: livekit/livekit-server:latest
    container_name: saybridge_livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    networks:
      - saybridge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7880/"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  saybridge-network:
    driver: bridge

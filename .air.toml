# .air.toml — đặt ở /backend/.air.toml
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/api ./cmd/api"
bin = "tmp/api"
full_bin = "./tmp/api"
include_ext = ["go", "toml", "yaml"]
exclude_dir = ["tmp", "vendor", "node_modules", "migrations", "plugins"]
delay = 1000  # ms (Độ trễ trước khi kích hoạt build lại)

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
